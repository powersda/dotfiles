[nightlight]
enabled = true
force = true
temperature_night = 4500

[notification]
show_app_name = false

[shell]
avatar_path = "/home/pwrhs/pictures/avatars/p_centered.png"
niri_overview_type_to_launch_enabled = true
settings_show_advanced = true
time_format = "{:%I:%M}"

    [shell.panel]
    control_center_placement = "floating"
    launcher_categories = false
    session_placement = "centered"
    transparency_mode = "soft"
    wallpaper_placement = "floating"

    [shell.screenshot]
    directory = "~/pictures/"
    save_to_file = false

[system.monitor]
enabled = false

[theme]
source = "wallpaper"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "niri" ]
    community_ids = [ "zathura" ]

[wallpaper]
directory = "~/pictures/wallpapers"

    [wallpaper.default]
    path = "/home/pwrhs/pictures/wallpapers/rollingwaves.png"

    [wallpaper.last]
    path = "/home/pwrhs/pictures/wallpapers/rollingwaves.png"

    [wallpaper.monitors.DP-1]
    path = "/home/pwrhs/pictures/wallpapers/rollingwaves.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/pwrhs/pictures/wallpapers/i3D4.jpg"

[weather]
enabled = false

[widget.active_window]
capsule = true
capsule_radius = 12

[widget.audio_visualizer]
bands = 128
centered = false
scale = 2.5
width = 400.0

[widget.clock]
format = "{:%I:%M}"

[widget.date]
format = "|   {:%a %b %-d}"

[widget.spacer_2]
type = "spacer"

[widget.taskbar]
capsule_radius = 12
group_by_workspace = true
group_single_icon_per_app = true
hide_empty_workspaces = true
scale = 1.3500000000000001