[backdrop]
blur_intensity = 0.24999999441206455
enabled = true
tint_intensity = 0.29999999329447746

[bar]
order = [ "Top", "Visualizer" ]

    [bar.Top]
    background_opacity = 0.0
    center = []
    end = [ "group:g1" ]
    font_weight = 700
    margin_edge = 6
    margin_ends = 8
    padding = 0
    reserve_space = false
    shadow = false
    start = [ "taskbar", "active_window" ]
    widget_spacing = 10

        [[bar.Top.capsule_group]]
        fill = "surface_variant"
        id = "g1"
        members = [
            "tray",
            "notifications",
            "clipboard",
            "bluetooth",
            "network",
            "volume",
            "brightness",
            "battery",
            "date",
            "clock"
        ]
        opacity = 1.0
        padding = 10.0

    [bar.Visualizer]
    background_opacity = 0.0
    center = [ "audio_visualizer" ]
    enabled = true
    end = []
    margin_edge = 0
    margin_ends = 0
    padding = 0
    position = "bottom"
    reserve_space = false
    scale = 2.0000000223517418
    shadow = false
    start = []

[battery.device."/org/freedesktop/UPower/devices/battery_hidpp_battery_8"]
warning_threshold = 10

[desktop_widgets]
enabled = false

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 3600

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 900

[keybinds]
cancel = [ "Escape", "Alt+Escape" ]
down = [ "Alt+j" ]
left = [ "Alt+h" ]
right = [ "Alt+l" ]
up = [ "Alt+k" ]
validate = [ "Return", "Alt+Return" ]

